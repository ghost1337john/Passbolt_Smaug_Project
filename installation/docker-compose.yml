networks:
  bdd_passbolt:
    name: bdd_passbolt
    # external: true
    driver: bridge

services:
  db:
    container_name: db
    image: mariadb:11.8.6 #Dernière version de MariaDB compatible avec Passbolt au moment de la rédaction - changer si besoin pour une version plus récente
    restart: unless-stopped
    env_file:
      - ./passbolt.env
    networks:
      - bdd_passbolt
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "true"
      MYSQL_DATABASE: "passbolt"
      MYSQL_USER: $MYSQL_USER
      MYSQL_PASSWORD: $MYSQL_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - ${PASSBOLT_BASE_PATH}/database_volume:/var/lib/mysql
     
  passbolt:
    image: passbolt/passbolt:latest-ce
    container_name: passbolt
    # Alternatively you can use rootless:
    # image: passbolt/passbolt:latest-ce-non-root
    restart: unless-stopped
    env_file:
      - ./passbolt.env
    networks:
      - bdd_passbolt
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_FULL_BASE_URL: $APP_FULL_BASE_URL
      DATASOURCES_DEFAULT_HOST: "db"
      DATASOURCES_DEFAULT_USERNAME: $MYSQL_USER
      DATASOURCES_DEFAULT_PASSWORD: $MYSQL_PASSWORD
      DATASOURCES_DEFAULT_DATABASE: "passbolt"
      EMAIL_DEFAULT_FROM_NAME: $EMAIL_DEFAULT_FROM_NAME
      EMAIL_DEFAULT_FROM: $EMAIL_TRANSPORT_DEFAULT_USERNAME
      EMAIL_TRANSPORT_DEFAULT_HOST: $EMAIL_TRANSPORT_DEFAULT_HOST
      EMAIL_TRANSPORT_DEFAULT_PORT: $EMAIL_TRANSPORT_DEFAULT_PORT
      EMAIL_TRANSPORT_DEFAULT_USERNAME: $EMAIL_TRANSPORT_DEFAULT_USERNAME
      EMAIL_TRANSPORT_DEFAULT_PASSWORD: $EMAIL_TRANSPORT_DEFAULT_PASSWORD
      EMAIL_TRANSPORT_DEFAULT_TLS: $EMAIL_TRANSPORT_DEFAULT_TLS
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/healthcheck/status.json >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - ${PASSBOLT_BASE_PATH}/gpg_volume:/etc/passbolt/gpg
      - ${PASSBOLT_BASE_PATH}/jwt_volume:/etc/passbolt/jwt
    command:
      [
        "/usr/bin/wait-for.sh",
        "-t",
        "0",
        "db:3306",
        "--",
        "/docker-entrypoint.sh"
      ]
